<!DOCTYPE html>
<html>

<head>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

  {% include meta.html %}

  <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  <link href="https://fonts.googleapis.com/css?family=Vidaloka" rel="stylesheet"> 

  <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
</head>

<body>
  <header class="block main-header">
    <div class="container">
      <h1 class="main-header__title"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
      <p class="main-header__strapline">{{ site.description }}</p>
      <nav class="main-nav">
        <a class="main-nav__link" href="{{ site.baseurl }}/">Blog</a>
        <a class="main-nav__link" href="{{ site.baseurl }}/about">About</a>
      </nav>
    </div>
  </header>

  <section id="main" role="main" class="block main-content">
    <div class="container">
      {{ content }}
    </div>
  </section>

  <footer class="block main-footer">
    <div class="container">
      {% include svg-icons.html %}
      <p>Vince Lee 2018</p>
      <p>"This is Fine" stolen from <a href="https://kcgreendotcom.com/index.html">KC Green</a></p>
    </div>
  </footer>

  {% include analytics.html %}
</body>

</html>
